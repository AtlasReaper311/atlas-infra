name: Refresh Corpus

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.repository }}-refresh-corpus-${{ github.ref }}
  cancel-in-progress: false

jobs:
  refresh-corpus:
    uses: AtlasReaper311/atlas-corpus/.github/workflows/refresh-corpus.yml@410a0ba16c8461b191edbed257d0271d76bd8369 # atlas-corpus main
    secrets:
      CORPUS_SECRET: ${{ secrets.CORPUS_SECRET }}
