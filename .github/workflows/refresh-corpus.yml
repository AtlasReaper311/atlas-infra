name: Refresh Corpus

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.repository }}-refresh-corpus-${{ github.ref }}
  cancel-in-progress: false

jobs:
  refresh-corpus:
    uses: AtlasReaper311/atlas-corpus/.github/workflows/refresh-corpus.yml@main
    secrets:
      CORPUS_SECRET: ${{ secrets.CORPUS_SECRET }}
