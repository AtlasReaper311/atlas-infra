name: Repository README audit

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "advisory reports findings; enforce fails when README findings exist"
        required: true
        default: advisory
        type: choice
        options:
          - advisory
          - enforce

permissions:
  contents: read

concurrency:
  group: ${{ github.repository }}-repository-readme-audit-${{ github.ref }}
  cancel-in-progress: false

jobs:
  audit:
    name: Audit public README contract
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0, Node 24

      - name: Validate README contract tooling
        run: |
          set -euo pipefail
          python3 -m py_compile scripts/readme_contract.py scripts/repository_hygiene.py
          python3 -m unittest scripts.tests.test_readme_contract -v

      - name: Audit approved public READMEs
        env:
          GITHUB_TOKEN: ${{ github.token }}
          MODE: ${{ inputs.mode }}
        run: |
          set -euo pipefail
          mkdir -p reports
          python3 scripts/readme_contract.py audit-public \
            --mode "$MODE" \
            --json-out reports/repository-readme-audit.json \
            --markdown-out reports/repository-readme-audit.md
          cat reports/repository-readme-audit.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload README audit report
        if: always() && hashFiles('reports/**') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1, Node 24
        with:
          name: repository-readme-audit-${{ github.run_id }}
          path: reports
          if-no-files-found: error
          retention-days: 30
