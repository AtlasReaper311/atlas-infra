name: Contract registry CI

on:
  pull_request:
    paths:
      - "contracts/**"
      - "docs/adrs/**"
      - "docs/atlas-trace.md"
      - "docs/wave3-contracts.md"
      - "docs/repository-hygiene.md"
      - "docs/worker-contract-enforcement.md"
      - "docs/runbooks/**"
      - "policy/estate-registry.json"
      - "policy/estate-registry.schema.json"
      - "policy/public-assurance-repositories.json"
      - "policy/public-assurance-repositories.schema.json"
      - "policy/public-cloudflare-resources.json"
      - "policy/public-cloudflare-resources.schema.json"
      - "policy/public-cloudflare-topology.json"
      - "policy/public-cloudflare-topology.schema.json"
      - "policy/public-repository-classifications.json"
      - "policy/public-repository-classifications.schema.json"
      - "policy/reliability/**"
      - "policy/repository-hygiene.json"
      - "policy/schemas/reliability-*.schema.json"
      - "policy/schemas/repository-hygiene.schema.json"
      - "policy/service-contracts/**"
      - "scripts/adr_trace.py"
      - "scripts/atlas_trace.py"
      - "scripts/contract_registry.py"
      - "scripts/control_plane_contracts.py"
      - "scripts/public_cloudflare_topology.py"
      - "scripts/public_repository_classifications.py"
      - "scripts/readme_contract.py"
      - "scripts/reliability_policy.py"
      - "scripts/repository_hygiene.py"
      - "scripts/repository_labels.py"
      - "scripts/repository_metadata.py"
      - "scripts/wave3_contracts.py"
      - "scripts/worker_contract.py"
      - "scripts/validate_contract_registry.py"
      - "scripts/tests/**"
      - ".github/workflows/contract-registry-ci.yml"
      - ".github/workflows/deploy-worker.yml"
      - ".github/workflows/repository-hygiene-audit.yml"
      - ".github/workflows/repository-label-audit.yml"
      - ".github/workflows/repository-metadata-audit.yml"
      - ".github/workflows/repository-readme-audit.yml"
      - ".github/workflows/validate-private-labels.yml"
      - ".github/workflows/validate-private-metadata.yml"
      - ".github/workflows/validate-private-readme.yml"
  push:
    branches: [main]
    paths:
      - "contracts/**"
      - "docs/adrs/**"
      - "docs/atlas-trace.md"
      - "docs/wave3-contracts.md"
      - "docs/repository-hygiene.md"
      - "docs/worker-contract-enforcement.md"
      - "docs/runbooks/**"
      - "policy/estate-registry.json"
      - "policy/estate-registry.schema.json"
      - "policy/public-assurance-repositories.json"
      - "policy/public-assurance-repositories.schema.json"
      - "policy/public-cloudflare-resources.json"
      - "policy/public-cloudflare-resources.schema.json"
      - "policy/public-cloudflare-topology.json"
      - "policy/public-cloudflare-topology.schema.json"
      - "policy/public-repository-classifications.json"
      - "policy/public-repository-classifications.schema.json"
      - "policy/reliability/**"
      - "policy/repository-hygiene.json"
      - "policy/schemas/reliability-*.schema.json"
      - "policy/schemas/repository-hygiene.schema.json"
      - "policy/service-contracts/**"
      - "scripts/adr_trace.py"
      - "scripts/atlas_trace.py"
      - "scripts/contract_registry.py"
      - "scripts/control_plane_contracts.py"
      - "scripts/public_cloudflare_topology.py"
      - "scripts/public_repository_classifications.py"
      - "scripts/readme_contract.py"
      - "scripts/reliability_policy.py"
      - "scripts/repository_hygiene.py"
      - "scripts/repository_labels.py"
      - "scripts/repository_metadata.py"
      - "scripts/wave3_contracts.py"
      - "scripts/worker_contract.py"
      - "scripts/validate_contract_registry.py"
      - "scripts/tests/**"
      - ".github/workflows/contract-registry-ci.yml"
      - ".github/workflows/deploy-worker.yml"
      - ".github/workflows/repository-hygiene-audit.yml"
      - ".github/workflows/repository-label-audit.yml"
      - ".github/workflows/repository-metadata-audit.yml"
      - ".github/workflows/repository-readme-audit.yml"
      - ".github/workflows/validate-private-labels.yml"
      - ".github/workflows/validate-private-metadata.yml"
      - ".github/workflows/validate-private-readme.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.repository }}-contract-registry-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate public runtime contracts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0, Node 24

      - name: Validate public registry and service contracts
        run: |
          set -euo pipefail
          python3 scripts/validate_contract_registry.py \
            --report /tmp/registry-report.json \
            --markdown /tmp/registry-report.md \
            --graph /tmp/service-dependency-graph.json \
            --catalog /tmp/service-catalog.json

      - name: Validate public Cloudflare topology authority
        run: |
          set -euo pipefail
          python3 scripts/public_cloudflare_topology.py --root . --report /tmp/public-cloudflare-topology.json

      - name: Verify public repository classification projection
        run: |
          set -euo pipefail
          python3 scripts/public_repository_classifications.py --check

      - name: Validate repository hygiene policy
        run: |
          set -euo pipefail
          python3 scripts/repository_hygiene.py check-policy
          python3 scripts/repository_metadata.py check-policy
          python3 scripts/repository_labels.py check-policy

      - name: Validate Atlas Trace contracts
        run: |
          set -euo pipefail
          python3 scripts/atlas_trace.py validate-contracts

      - name: Validate Wave 3.1 governance contracts
        run: |
          set -euo pipefail
          python3 scripts/wave3_contracts.py check --root .
          python3 scripts/adr_trace.py check --root .

      - name: Compile registry tooling
        run: |
          set -euo pipefail
          python3 -m py_compile \
            scripts/adr_trace.py \
            scripts/atlas_trace.py \
            scripts/contract_registry.py \
            scripts/control_plane_contracts.py \
            scripts/public_cloudflare_topology.py \
            scripts/public_repository_classifications.py \
            scripts/readme_contract.py \
            scripts/reliability_policy.py \
            scripts/repository_hygiene.py \
            scripts/repository_labels.py \
            scripts/repository_metadata.py \
            scripts/wave3_contracts.py \
            scripts/worker_contract.py \
            scripts/validate_contract_registry.py

      - name: Run control-plane unit tests
        run: |
          set -euo pipefail
          python3 -m unittest discover -s scripts/tests -v > /tmp/control-plane-unit-tests.log 2>&1

      - name: Upload failing unit-test output
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: control-plane-unit-test-output
          path: /tmp/control-plane-unit-tests.log
          retention-days: 1
