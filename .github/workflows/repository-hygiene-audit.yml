name: Repository hygiene audit

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Audit mode. Advisory reports findings without failing; enforce fails on findings."
        required: true
        default: advisory
        type: choice
        options:
          - advisory
          - enforce
  schedule:
    - cron: "17 8 * * 3"

permissions:
  contents: read
  issues: read

concurrency:
  group: repository-hygiene-audit
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out Atlas Infra
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0, Node 24

      - name: Validate hygiene policy offline
        run: |
          set -euo pipefail
          python3 -m py_compile scripts/repository_hygiene.py
          python3 scripts/repository_hygiene.py check-policy
          python3 -m unittest scripts.tests.test_repository_hygiene -v

      - name: Audit approved public repositories
        env:
          GITHUB_TOKEN: ${{ github.token }}
          DISPATCH_MODE: ${{ inputs.mode }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          MODE="${DISPATCH_MODE:-advisory}"
          if [ "$EVENT_NAME" = "schedule" ]; then
            MODE="advisory"
          fi

          mkdir -p reports

          set +e
          python3 scripts/repository_hygiene.py audit-live \
            --mode "$MODE" \
            --json-out reports/repository-hygiene.json \
            --markdown-out reports/repository-hygiene.md
          AUDIT_STATUS=$?
          set -e

          cat reports/repository-hygiene.md >> "$GITHUB_STEP_SUMMARY"
          exit "$AUDIT_STATUS"

      - name: Upload sanitized hygiene report
        if: always() && hashFiles('reports/**') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1, Node 24
        with:
          name: repository-hygiene-${{ github.run_id }}
          path: reports/
          retention-days: 30
