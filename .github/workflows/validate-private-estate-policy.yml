name: Validate private repository estate policy

on:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ${{ github.repository }}-private-estate-policy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Private estate conformance
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out pinned Atlas policy tooling
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0, Node 24
        with:
          repository: AtlasReaper311/atlas-infra
          ref: 3b93154177dc7cfedd4fa8d0edbc909b08f1185e
          path: .atlas-infra
          persist-credentials: false

      - name: Build source-local audit manifest
        env:
          TARGET_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          manifest = {
              "repositories": [
                  {"repository": os.environ["TARGET_REPOSITORY"]}
              ]
          }
          Path("private-estate-manifest.json").write_text(
              json.dumps(manifest, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Validate source-local estate conformance
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python3 .atlas-infra/scripts/estate_policy.py \
            --manifest private-estate-manifest.json \
            --policy .atlas-infra/policy/estate-policy.json \
            --markdown private-estate-policy.md \
            --json private-estate-policy.json
          cat private-estate-policy.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload private conformance evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: private-estate-policy-${{ github.run_id }}
          path: |
            private-estate-policy.md
            private-estate-policy.json
          if-no-files-found: error
          retention-days: 30
