name: Estate policy

on:
  schedule:
    - cron: "23 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: estate-policy
  cancel-in-progress: false

jobs:
  policy:
    name: Audit repository conformance
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out atlas-infra
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0, Node 24

      - name: Validate assurance scripts
        run: |
          python3 -m py_compile scripts/assurance_scope.py
          python3 -m py_compile scripts/backup_audit.py
          python3 -m py_compile scripts/change_impact.py
          python3 -m py_compile scripts/contract_registry.py
          python3 -m py_compile scripts/control_plane_contracts.py
          python3 -m py_compile scripts/deploy_orchestrator.py
          python3 -m py_compile scripts/dependabot_rollout.py
          python3 -m py_compile scripts/detect_ecosystem.py
          python3 -m py_compile scripts/estate_repo_diff.py
          python3 -m py_compile scripts/estate_policy.py
          python3 -m py_compile scripts/github_api.py
          python3 -m py_compile scripts/chaos_harness.py
          python3 -m py_compile scripts/public_boundary_audit.py
          python3 -m py_compile scripts/public_repository_classifications.py
          python3 -m py_compile scripts/publish_evidence.py
          python3 -m py_compile scripts/notify_assurance.py
          python3 -m py_compile scripts/validate_contract_registry.py
          python3 -m py_compile scripts/validate_control_plane_contracts.py
          python3 -m py_compile scripts/validate_public_cloudflare_resources.py
          python3 -m unittest discover -s scripts/tests -v
          python3 scripts/validate_control_plane_contracts.py
          python3 scripts/public_repository_classifications.py --check
          python3 scripts/validate_public_cloudflare_resources.py \
            --json reports/public-cloudflare-resources.json \
            --quiet
          python3 scripts/chaos_harness.py validate \
            --policy policy/chaos-experiments.json
          python3 scripts/deploy_orchestrator.py validate \
            --output reports/deploy-policy-validation.json \
            --markdown reports/deploy-policy-validation.md \
            --quiet
          python3 scripts/deploy_orchestrator.py plan \
            --service atlas-api-public \
            --environment production \
            --output reports/deploy-plan.json \
            --markdown reports/deploy-plan.md \
            --quiet
          python3 scripts/validate_contract_registry.py \
            --report reports/contract-registry.json \
            --markdown reports/contract-registry.md \
            --graph reports/service-dependency-graph.json \
            --catalog reports/service-catalog.json
          python3 scripts/backup_audit.py \
            --policy policy/backup-audit.json \
            --fixtures tests/fixtures/backup-audit \
            --report reports/backup-audit.json \
            --markdown reports/backup-audit.md \
            --now 2026-07-14T12:00:00Z \
            --quiet
          cat reports/contract-registry.md >> "$GITHUB_STEP_SUMMARY"
          cat reports/backup-audit.md >> "$GITHUB_STEP_SUMMARY"
          cat reports/deploy-plan.md >> "$GITHUB_STEP_SUMMARY"

      - name: Audit estate policy
        id: policy
        continue-on-error: true
        env:
          GH_DIGEST_PAT: ${{ secrets.GH_DIGEST_PAT }}
        run: |
          python3 scripts/assurance_scope.py \
            --input policy/estate-registry.json \
            --output reports/estate-assurance-registry.json
          python3 scripts/estate_policy.py \
            --manifest reports/estate-assurance-registry.json \
            --policy policy/estate-policy.json \
            --markdown reports/estate-policy.md \
            --json reports/estate-policy.json
          cat reports/estate-policy.md >> "$GITHUB_STEP_SUMMARY"

      - name: Audit public and private source boundary
        env:
          GH_DIGEST_PAT: ${{ secrets.GH_DIGEST_PAT }}
        run: |
          set +e
          python3 scripts/public_boundary_audit.py \
            --github-owner AtlasReaper311 \
            --token-env GH_DIGEST_PAT \
            --report reports/public-boundary-audit.json \
            --markdown reports/public-boundary-audit.md \
            --quiet
          BOUNDARY_STATUS=$?
          set -e
          if [ -f reports/public-boundary-audit.md ]; then
            cat reports/public-boundary-audit.md >> "$GITHUB_STEP_SUMMARY"
          fi
          exit "$BOUNDARY_STATUS"

      - name: Publish public conformance evidence
        if: always() && hashFiles('reports/estate-policy.json') != ''
        env:
          EVIDENCE_REPORT_KEY: ${{ secrets.EVIDENCE_REPORT_KEY }}
        run: |
          python3 scripts/publish_evidence.py \
            --kind conformance \
            --file reports/estate-policy.json

      - name: Upload policy report
        if: always() && hashFiles('reports/**') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1, Node 24
        with:
          name: estate-policy-${{ github.run_id }}
          path: reports
          if-no-files-found: error
          retention-days: 90

      - name: Report consolidated findings
        if: always()
        run: |
          python3 scripts/notify_assurance.py \
            --conformance reports/estate-policy.json \
            --output reports/assurance-summary.json
