# Append to a Worker's wrangler.toml to add a dev environment.
#
# THE INHERITANCE GOTCHA: named environments do NOT inherit `vars`,
# `kv_namespaces`, `routes`, or `triggers` from the top level. Anything
# the dev Worker needs must be redeclared here, or it deploys with those
# values empty. This is the single most common wrangler.toml mistake.
#
# Design rules used across Atlas Systems:
#   workers_dev = true   dev is reachable at <name>-dev.<sub>.workers.dev
#   no `routes`          dev must never claim a production api path
#   no `triggers`        dev must not run crons (no Discord spam, no polling)
#   separate KV id       dev gets its own namespace, never the prod cache

[env.dev]
workers_dev = true

[env.dev.vars]
# Redeclare every production var the Worker reads.
EXAMPLE_VAR = "value"

[[env.dev.kv_namespaces]]
binding = "EXAMPLE_BINDING"
# Create with: npx wrangler kv namespace create EXAMPLE_DEV --env dev
id = "REPLACE_WITH_DEV_NAMESPACE_ID"
